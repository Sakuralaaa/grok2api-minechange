services:
  grok2api:
    container_name: grok2api
    image: ghcr.io/chenyme/grok2api:latest
    ports:
      - "${HOST_PORT:-8000}:${SERVER_PORT:-8000}"
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8000}
      SERVER_WORKERS: ${SERVER_WORKERS:-1}
      ACCOUNT_STORAGE: ${ACCOUNT_STORAGE:-local}
      ACCOUNT_LOCAL_PATH: ${ACCOUNT_LOCAL_PATH:-data/accounts.db}
      ACCOUNT_REDIS_URL: ${ACCOUNT_REDIS_URL:-}
      ACCOUNT_MYSQL_URL: ${ACCOUNT_MYSQL_URL:-}
      ACCOUNT_POSTGRESQL_URL: ${ACCOUNT_POSTGRESQL_URL:-}
      # Optional FlareSolverr sidecar URL inside this compose network:
      # set proxy.clearance.flaresolverr_url to http://flaresolverr:8191 in Admin -> Config.
      # Optional SOCKS egress example:
      # set proxy.egress.proxy_url to socks5://warp:1080 or socks5://proxy:1080.

      # ACCOUNT_STORAGE: local | redis | mysql | postgresql
      # ACCOUNT_LOCAL_PATH: SQLite path when ACCOUNT_STORAGE=local
      # ACCOUNT_REDIS_URL: Redis DSN when ACCOUNT_STORAGE=redis
      # ACCOUNT_MYSQL_URL: MySQL DSN when ACCOUNT_STORAGE=mysql
      # ACCOUNT_POSTGRESQL_URL: PostgreSQL DSN when ACCOUNT_STORAGE=postgresql
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  # 如果出口 IP 不干净，可取消以下注释使用 Warp 作为 SOCKS 出口代理
  # 启用后将 proxy.egress.mode 设为 single_proxy，并将 proxy.egress.proxy_url 设为 socks5://warp:1080
  # warp:
  #   container_name: warp
  #   image: caomingjun/warp:latest
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:1080:1080"
  #   environment:
  #     - WARP_SLEEP=2
  #   cap_add:
  #     - NET_ADMIN

  # Optional FlareSolverr sidecar for Cloudflare clearance checks.
  # In Admin -> Config, set:
  #   proxy.clearance.mode = flaresolverr
  #   proxy.clearance.flaresolverr_url = http://flaresolverr:8191
  # flaresolverr:
  #   container_name: flaresolverr
  #   image: ghcr.io/flaresolverr/flaresolverr:latest
  #   ports:
  #     - "127.0.0.1:8191:8191"
  #   environment:
  #     TZ: Asia/Shanghai
  #     LOG_LEVEL: info
  #   restart: unless-stopped
