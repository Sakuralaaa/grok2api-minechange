# Usage:
#   docker compose up -d                                # pull base image
#   IMAGE_SUFFIX=-reg docker compose up -d              # pull reg image (with Chromium)
#   docker compose -f docker-compose.yml build          # build base locally
#   docker compose -f docker-compose.reg.yml build      # build reg locally

services:
  grok2api:
    container_name: grok2api${IMAGE_SUFFIX:-}
    image: ghcr.io/chenyme/grok2api${IMAGE_SUFFIX:-}:latest
    ports:
      - "${HOST_PORT:-8000}:${SERVER_PORT:-8000}"
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8000}
      SERVER_WORKERS: ${SERVER_WORKERS:-1}
      ACCOUNT_STORAGE: ${ACCOUNT_STORAGE:-local}
      ACCOUNT_LOCAL_PATH: ${ACCOUNT_LOCAL_PATH:-data/accounts.db}
      ACCOUNT_REDIS_URL: ${ACCOUNT_REDIS_URL:-}
      ACCOUNT_MYSQL_URL: ${ACCOUNT_MYSQL_URL:-}
      ACCOUNT_POSTGRESQL_URL: ${ACCOUNT_POSTGRESQL_URL:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  # If your egress IP is dirty, uncomment to use Warp as SOCKS egress proxy.
  # Set proxy.egress.mode = single_proxy and proxy.egress.proxy_url = socks5://warp:1080
  # warp:
  #   container_name: warp
  #   image: caomingjun/warp:latest
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:1080:1080"
  #   environment:
  #     - WARP_SLEEP=2
  #   cap_add:
  #     - NET_ADMIN

  # Optional FlareSolverr sidecar for Cloudflare clearance.
  # In Admin -> Config, set:
  #   proxy.clearance.mode = flaresolverr
  #   proxy.clearance.flaresolverr_url = http://flaresolverr:8191
